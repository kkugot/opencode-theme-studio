name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve Pages base path
        id: base-path
        env:
          PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
        run: |
          base_path="$PAGES_BASE_PATH"

          if [ -z "$base_path" ]; then
            if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
              base_path="/"
            else
              base_path="/${{ github.event.repository.name }}/"
            fi
          fi

          if [ "$base_path" != "/" ]; then
            base_path="/${base_path#/}"
            base_path="${base_path%/}/"
          fi

          echo "value=$base_path" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm install

      - name: Lint project
        run: npm run lint

      - name: Build project
        run: npm run build -- --base "${{ steps.base-path.outputs.value }}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
